---
- tags: [k8s, k8s.syncthing]
  block:
    - name: download helm chart
      ansible.builtin.get_url:
        url: https://github.com/k8s-at-home/charts/releases/download/syncthing-3.5.2/syncthing-3.5.2.tgz
        dest: &p /tmp/syncthing.chart.tgz
        mode: 0644
        owner: root
        group: root
    - name: install syncthing helm chart
      kubernetes.core.helm:
        chart_ref: *p
        release_namespace: "{{ k8s_syncthing__namespace }}"
        release_name: "{{ release_name }}"
        release_values: "{{ values }}"
        create_namespace: true
        atomic: true
        state: present
      run_once: true
  always:
    - name: remove helm chart
      ansible.builtin.file:
        path: *p
        state: absent
  become: true
